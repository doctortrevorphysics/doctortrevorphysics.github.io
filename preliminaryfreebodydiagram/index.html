<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Body Diagram Creator</title>
    <!-- Using Tailwind CSS via CDN for rapid, responsive, and accessible styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for interactions and inputs */
        canvas {
            touch-action: none; /* Prevents page scrolling when dragging vectors on touch devices */
            cursor: crosshair;
        }
        .slider-input {
            accent-color: #4b5563; /* Mid-gray accent for sliders to fit the simple line drawing style */
        }
        /* Hide number input arrows for cleaner look */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 font-sans min-h-screen flex flex-col items-center py-6 px-4">

    <!-- Header -->
    <header class="text-center mb-6 w-full max-w-5xl">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">Free Body Diagram Creator</h1>
        <p class="text-gray-600">Add forces, adjust their magnitude and direction, and download your diagram.</p>
    </header>

    <!-- Main Content -->
    <main class="flex flex-col lg:flex-row gap-8 w-full max-w-6xl justify-center items-start">
        
        <!-- Controls Panel -->
        <section class="w-full lg:w-1/3 bg-white rounded-xl shadow-md p-6 flex flex-col gap-6" aria-label="Force Controls">
            
            <!-- Add New Force -->
            <div class="flex flex-col gap-2 border-b pb-6 border-gray-200">
                <label for="new-force-name" class="font-semibold text-gray-700">Add a New Force</label>
                <div class="flex gap-2">
                    <input type="text" id="new-force-name" placeholder="e.g., Fg, Fn, Ff" 
                        class="flex-1 border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-gray-400"
                        onkeypress="if(event.key === 'Enter') handleAddForce()">
                    <button onclick="handleAddForce()" 
                        class="bg-gray-800 hover:bg-gray-700 text-white font-medium py-2 px-4 rounded-lg transition-colors focus:ring-2 focus:ring-offset-2 focus:ring-gray-800">
                        Add
                    </button>
                </div>
            </div>

            <!-- List of Forces -->
            <div id="forces-list" class="flex flex-col gap-4 overflow-y-auto max-h-[50vh] pr-2" aria-live="polite">
                <!-- Force control items will be injected here by JS -->
            </div>

        </section>

        <!-- Canvas & Export Panel -->
        <section class="w-full lg:w-fit flex flex-col items-center gap-4 bg-white rounded-xl shadow-md p-6" aria-label="Diagram Canvas">
            
            <!-- Instructions -->
            <p class="text-sm text-gray-500 text-center max-w-[512px]">
                Tip: You can use the sliders on the left, or <strong>drag the colored handles</strong> on the canvas to adjust the forces directly.
            </p>

            <!-- The Canvas Container -->
            <div class="border-2 border-gray-200 rounded-lg overflow-hidden bg-white relative w-full max-w-[512px] aspect-square flex justify-center items-center">
                <canvas id="fbd-canvas" width="512" height="512" 
                    class="w-full h-auto object-contain block"
                    role="img" aria-label="Interactive Free Body Diagram">
                </canvas>
            </div>

            <!-- Download Button -->
            <button onclick="downloadDiagram()" 
                class="w-full max-w-[512px] bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg shadow-sm transition-colors focus:ring-2 focus:ring-offset-2 focus:ring-blue-600 flex justify-center items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                Download Diagram (.png)
            </button>
        </section>

    </main>

    <!-- JavaScript Application Logic -->
    <script>
        // ============================================================================
        // TEACHER CONFIGURATION
        // Modify these values to change the default behavior, language, or colors.
        // ============================================================================
        const CONFIG = {
            canvasSize: 512,
            centerRadius: 5,        // Size of the central black point
            maxVectorLength: 220,   // Prevents vectors from going off the 512x512 canvas
            
            // The default forces loaded when the page opens. 
            // magnitude is in pixels (0 to 220), angle is in degrees (0 = right, 90 = up).
            defaultForces: [
                { id: "force-1", name: "Fg", magnitude: 150, angle: 270, color: "#3b82f6" }, // Gravity (Down)
                { id: "force-2", name: "Fn", magnitude: 150, angle: 90,  color: "#ef4444" }  // Normal (Up)
            ],

            // Colors assigned to new forces. (Middle of the palette style)
            colors: [
                "#10b981", // Emerald
                "#f59e0b", // Amber
                "#8b5cf6", // Violet
                "#0ea5e9", // Sky
                "#f43f5e", // Rose
                "#64748b"  // Slate
            ],
            
            // Text settings for the vector labels
            font: "italic 20px 'Times New Roman', serif",
            labelOffset: 20 // Distance of the text from the arrowhead
        };
        // ============================================================================
        
        
        // --- State Management ---
        let forces = [...CONFIG.defaultForces.map(f => ({...f}))];
        let nextColorIndex = 0;
        let draggingForceId = null;
        let forceIdCounter = 3;

        // --- DOM Elements ---
        const canvas = document.getElementById('fbd-canvas');
        const ctx = canvas.getContext('2d');
        const forcesListEl = document.getElementById('forces-list');
        const newForceNameEl = document.getElementById('new-force-name');

        // --- Initialization ---
        function init() {
            renderControls();
            drawCanvas();
            setupCanvasInteractions();
        }

        // --- Canvas Drawing Logic ---
        function drawCanvas() {
            // 1. Clear and fill background with white (necessary for PNG export)
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, CONFIG.canvasSize, CONFIG.canvasSize);

            const cx = CONFIG.canvasSize / 2;
            const cy = CONFIG.canvasSize / 2;

            // 2. Update ARIA label for screen readers
            updateCanvasAriaLabel();

            // 3. Draw forces
            forces.forEach(force => {
                const rad = force.angle * Math.PI / 180;
                
                // Canvas Y is inverted (0 is top), so we subtract for standard Cartesian representation
                const endX = cx + force.magnitude * Math.cos(rad);
                const endY = cy - force.magnitude * Math.sin(rad);

                // Draw line
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = '#1f2937'; // Dark gray/black for line drawing style
                ctx.lineWidth = 3;
                ctx.stroke();

                // Draw arrowhead
                drawArrowhead(cx, cy, endX, endY, force.color);

                // Draw drag handle (subtle circle at the end)
                ctx.beginPath();
                ctx.arc(endX, endY, 12, 0, Math.PI * 2);
                ctx.fillStyle = force.color;
                ctx.globalAlpha = 0.2;
                ctx.fill();
                ctx.globalAlpha = 1.0;

                // Draw Text Label
                ctx.fillStyle = force.color; // Match text color to drag handle for clarity
                ctx.font = CONFIG.font;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                
                // Position text slightly past the arrowhead
                const textX = cx + (force.magnitude + CONFIG.labelOffset) * Math.cos(rad);
                const textY = cy - (force.magnitude + CONFIG.labelOffset) * Math.sin(rad);
                ctx.fillText(force.name, textX, textY);
            });

            // 4. Draw Center Black Point (drawn last so it stays on top)
            ctx.beginPath();
            ctx.arc(cx, cy, CONFIG.centerRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#000000';
            ctx.fill();
        }

        function drawArrowhead(fromX, fromY, toX, toY, color) {
            const headlen = 15; // Length of arrowhead
            const angle = Math.atan2(toY - fromY, toX - fromX);
            
            ctx.beginPath();
            ctx.moveTo(toX, toY);
            ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
            ctx.lineTo(toX, toY);
            ctx.fillStyle = color; // Colored arrowhead to differentiate vectors
            ctx.fill();
        }

        function updateCanvasAriaLabel() {
            if (forces.length === 0) {
                canvas.setAttribute('aria-label', "Empty free body diagram.");
                return;
            }
            const desc = forces.map(f => `${f.name} with magnitude ${Math.round(f.magnitude)} at ${Math.round(f.angle)} degrees`).join(', ');
            canvas.setAttribute('aria-label', `Free body diagram showing vectors: ${desc}.`);
        }

        // --- Interaction Logic (Controls) ---
        function handleAddForce() {
            const name = newForceNameEl.value.trim();
            if (!name) return;

            const newForce = {
                id: `force-${forceIdCounter++}`,
                name: name,
                magnitude: 100, // Default starting magnitude
                angle: 45,      // Default starting angle
                color: CONFIG.colors[nextColorIndex % CONFIG.colors.length]
            };

            forces.push(newForce);
            nextColorIndex++;
            newForceNameEl.value = '';
            
            renderControls();
            drawCanvas();
        }

        function updateForce(id, field, value) {
            const force = forces.find(f => f.id === id);
            if (force) {
                force[field] = parseFloat(value);
                drawCanvas();
                
                // Sync number input and slider dynamically
                const slider = document.getElementById(`${field}-slider-${id}`);
                const numInput = document.getElementById(`${field}-num-${id}`);
                if (slider && slider.value !== value.toString()) slider.value = value;
                if (numInput && numInput.value !== value.toString()) numInput.value = value;
            }
        }

        function removeForce(id) {
            forces = forces.filter(f => f.id !== id);
            renderControls();
            drawCanvas();
        }

        // --- UI Rendering ---
        function renderControls() {
            forcesListEl.innerHTML = '';
            
            if (forces.length === 0) {
                forcesListEl.innerHTML = `<p class="text-sm text-gray-500 italic">No forces added. Add one above.</p>`;
                return;
            }

            forces.forEach(force => {
                const item = document.createElement('div');
                item.className = "bg-gray-50 border border-gray-200 rounded-lg p-4 flex flex-col gap-3";
                
                item.innerHTML = `
                    <div class="flex justify-between items-center border-b border-gray-200 pb-2">
                        <div class="flex items-center gap-2">
                            <span class="w-3 h-3 rounded-full" style="background-color: ${force.color}"></span>
                            <span class="font-bold text-gray-800 font-serif italic text-lg">${force.name}</span>
                        </div>
                        <button onclick="removeForce('${force.id}')" class="text-red-500 hover:text-red-700 text-sm font-semibold p-1 transition-colors" aria-label="Remove force ${force.name}">
                            Remove
                        </button>
                    </div>

                    <!-- Magnitude Control -->
                    <div class="flex flex-col gap-1">
                        <div class="flex justify-between items-center">
                            <label for="magnitude-slider-${force.id}" class="text-xs font-semibold text-gray-600 uppercase tracking-wide">Length</label>
                            <input type="number" id="magnitude-num-${force.id}" value="${Math.round(force.magnitude)}" min="0" max="${CONFIG.maxVectorLength}" 
                                class="w-16 text-right border border-gray-300 rounded px-1 py-0.5 text-sm"
                                oninput="updateForce('${force.id}', 'magnitude', this.value)">
                        </div>
                        <input type="range" id="magnitude-slider-${force.id}" value="${force.magnitude}" min="0" max="${CONFIG.maxVectorLength}" step="1" 
                            class="slider-input w-full cursor-pointer"
                            oninput="updateForce('${force.id}', 'magnitude', this.value)">
                    </div>

                    <!-- Angle Control -->
                    <div class="flex flex-col gap-1">
                        <div class="flex justify-between items-center">
                            <label for="angle-slider-${force.id}" class="text-xs font-semibold text-gray-600 uppercase tracking-wide">Direction (°)</label>
                            <input type="number" id="angle-num-${force.id}" value="${Math.round(force.angle)}" min="0" max="360" 
                                class="w-16 text-right border border-gray-300 rounded px-1 py-0.5 text-sm"
                                oninput="updateForce('${force.id}', 'angle', this.value)">
                        </div>
                        <input type="range" id="angle-slider-${force.id}" value="${force.angle}" min="0" max="360" step="1" 
                            class="slider-input w-full cursor-pointer"
                            oninput="updateForce('${force.id}', 'angle', this.value)">
                    </div>
                `;
                forcesListEl.appendChild(item);
            });
        }

        // --- Interaction Logic (Canvas Dragging) ---
        function setupCanvasInteractions() {
            // Mouse Events
            canvas.addEventListener('mousedown', handlePointerDown);
            canvas.addEventListener('mousemove', handlePointerMove);
            window.addEventListener('mouseup', handlePointerUp);

            // Touch Events (mapping to same logic)
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handlePointerDown(e.touches[0]); }, { passive: false });
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handlePointerMove(e.touches[0]); }, { passive: false });
            window.addEventListener('touchend', handlePointerUp);
        }

        function getMousePos(evt) {
            const rect = canvas.getBoundingClientRect();
            // Scale calculations to account for responsive CSS resizing of the canvas
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (evt.clientX - rect.left) * scaleX,
                y: (evt.clientY - rect.top) * scaleY
            };
        }

        function handlePointerDown(e) {
            const pos = getMousePos(e);
            const cx = CONFIG.canvasSize / 2;
            const cy = CONFIG.canvasSize / 2;

            // Check if click is near any vector head (reverse order to pick top ones first)
            for (let i = forces.length - 1; i >= 0; i--) {
                const force = forces[i];
                const rad = force.angle * Math.PI / 180;
                const endX = cx + force.magnitude * Math.cos(rad);
                const endY = cy - force.magnitude * Math.sin(rad);

                // Distance from click to vector head
                const dist = Math.hypot(pos.x - endX, pos.y - endY);
                if (dist < 25) { // 25px hit radius
                    draggingForceId = force.id;
                    canvas.style.cursor = 'grabbing';
                    break;
                }
            }
        }

        function handlePointerMove(e) {
            if (!draggingForceId) return;

            const pos = getMousePos(e);
            const cx = CONFIG.canvasSize / 2;
            const cy = CONFIG.canvasSize / 2;

            // Calculate new magnitude and angle
            let dx = pos.x - cx;
            let dy = cy - pos.y; // Invert Y back to standard Cartesian

            let newMag = Math.hypot(dx, dy);
            // Constrain magnitude to keep it on canvas
            newMag = Math.min(newMag, CONFIG.maxVectorLength);

            let newAngle = Math.atan2(dy, dx) * 180 / Math.PI;
            if (newAngle < 0) newAngle += 360;

            // Apply updates
            updateForce(draggingForceId, 'magnitude', newMag);
            updateForce(draggingForceId, 'angle', newAngle);
        }

        function handlePointerUp() {
            draggingForceId = null;
            canvas.style.cursor = 'crosshair';
        }

        // --- Export functionality ---
        function downloadDiagram() {
            // Temporarily ensure canvas is drawn cleanly
            drawCanvas();
            
            try {
                const dataUrl = canvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.download = 'free_body_diagram.png';
                link.href = dataUrl;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (err) {
                alert("Could not download the image. Please ensure you are running this in a modern browser.");
            }
        }

        // Boot up
        window.onload = init;
    </script>
</body>
</html>
